# Base configuration for language-agnostic hooks
# These hooks can be used across any project regardless of programming language

pre-commit:
  commands:
    format:
      # Simple formatting fixes: remove trailing whitespace and ensure final newline
      run: basefmt {staged_files}
      glob: '*'
      stage_fixed: true

    prettier:
      run: |
        # Prefer the locally installed prettier when the root has a node_modules
        # (single Node project / pnpm workspace root / npm / bun install). Otherwise
        # fall back to mise, which generic-boilerplate provisions via `npm:prettier`
        # for repositories that keep tooling outside of a root node_modules
        # (e.g. `monorepo_node_workspace: false`).
        # Avoiding `npx` here is intentional: when the root has a package.json but
        # no node_modules, npx would fetch prettier from the npm registry on every
        # commit and can hang for minutes on slow networks.
        if [ -x node_modules/.bin/prettier ]; then
          node_modules/.bin/prettier --write --ignore-unknown --no-error-on-unmatched-pattern {staged_files}
        else
          mise x -- prettier --write --ignore-unknown --no-error-on-unmatched-pattern {staged_files}
        fi
      stage_fixed: true

    shellcheck:
      file_types:
        - text/x-shellscript
      exclude:
        - '*.zsh'
      run: mise x shellcheck -- shellcheck {staged_files}

    shfmt:
      file_types:
        - text/x-shellscript
      exclude:
        - '*.zsh'
      run: mise x shfmt -- shfmt --apply-ignore -w {staged_files}
      stage_fixed: true

    pinact:
      glob: '{.github/workflows/*.{yml,yaml},.github/actions/**/action.{yml,yaml}}'
      run: mise x pinact -- pinact run {staged_files}
      stage_fixed: true

    actionlint:
      glob: '.github/workflows/*.{yml,yaml}'
      run: mise x actionlint -- actionlint {staged_files}

    copier-src-path:
      glob: '.copier-answers.yml'
      run: |
        # Check if _src_path uses gh: prefix (not supported by Renovate)
        # See: https://github.com/renovatebot/renovate/issues/39938
        for file in {staged_files}; do
          if [ -f "$file" ]; then
            # Handle both quoted and unquoted values (e.g., gh:org/repo or "gh:org/repo")
            if grep -qE "^_src_path:[[:space:]]*['\"]?gh:" "$file"; then
              src_path=$(grep -E "^_src_path:" "$file" | head -n 1 | sed 's/^_src_path:[[:space:]]*//')
              suggested_path=$(echo "$src_path" | sed -e "s|^['\"]\\{0,1\\}gh:|https://github.com/|" -e "s|['\"]\\{0,1\\}$||")
              echo "Error: $file uses 'gh:' prefix in _src_path, which is not supported by Renovate." >&2
              echo "Please use a full 'https://' URL instead." >&2
              printf "  Current:   %s\n  Suggested: %s\n" "$src_path" "$suggested_path" >&2
              exit 1
            fi
          fi
        done

commit-msg:
  commands:
    commitlint:
      run: |
        # Same rationale as the prettier hook above: prefer the root node_modules
        # binary, otherwise fall back to mise (generic-boilerplate provisions
        # `npm:@commitlint/cli` for repos without a root node_modules). Avoid npx
        # to prevent per-commit registry round-trips that can hang.
        if [ -x node_modules/.bin/commitlint ]; then
          node_modules/.bin/commitlint --edit {1}
        else
          mise x -- commitlint --edit {1}
        fi
